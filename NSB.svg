  <defs>
    <!-- Balloon gradient: bright highlight top-left → deep blue bottom-right -->
    <linearGradient id="balloonGrad" x1="20%" y1="5%" x2="80%" y2="95%">
      <stop offset="0%"   stop-color="#a8d4ff"/>
      <stop offset="30%"  stop-color="#3b82f6"/>
      <stop offset="70%"  stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>

    <!-- Specular shine: soft white radial glow for the balloon highlight -->
    <radialGradient id="balloonShine" cx="38%" cy="28%" r="38%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.72"/>
      <stop offset="60%"  stop-color="white" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to the E glyph shape for the shine overlay -->
